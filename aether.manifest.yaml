# EEIK Project Manifest — Aether
# Generated from eeik-bootstrap manifest-template.yaml
# Repo: suplab/aether

project:
  name: aether
  description: >
    Human-centric cognitive computing framework encompassing Aether philosophy,
    Aether Core (personal cognitive engine), and Aether Grid (distributed agent
    ecosystem). This repository implements Aether Grid as an enterprise-grade
    multi-agent platform with shared semantic memory, API governance, and
    autonomous self-debugging capabilities.
  owning_team: suplab
  business_domain: generic
  project_type: agent-platform

technology:
  backend:
    language: java
    version: "21"
    framework: spring-boot
    framework_version: "3.3.x"
  database:
    type: postgresql
    version: "16"
    migration_tool: flyway
    orm: spring-data-jdbc
    extensions:
      - pgvector
  cache:
    type: redis
    version: "7"
  messaging:
    broker: kafka
    pattern: event-driven
    reliability: transactional-outbox
  vector_store:
    primary: pgvector
    alternative: chroma
  llm:
    runtime: ollama
    models:
      - gemma2:2b
      - phi3-mini
    embedding_model: all-MiniLM-L6-v2
    embedding_dimensions: 384

architecture:
  style: modular-monolith
  runnable_applications:
    - name: aether-proxy
      role: data-plane
      port: 8080
    - name: aether-api
      role: control-plane
      port: 8081
  design_patterns:
    - hexagonal-architecture
    - domain-driven-design
    - cqrs
    - transactional-outbox
    - policy-as-code
    - agent-spi-plugin
  api_style: rest

ai:
  enabled: true
  pattern: multi-agent
  agents:
    - GovernanceAgent
    - RetryAgent
    - HallucinationDetectorAgent
    - PolicyDriftAgent
    - TemporalPredictionAgent
    - ReflectionAgent
  memory_pattern: vector-store
  memory_types:
    - episodic
    - semantic
    - procedural
    - emotional
  governance:
    confidence_threshold: 0.8
    human_in_the_loop: true
    hallucination_detection: true

governance:
  profile: enterprise
  review_requirements:
    - architecture-review
    - security-review
    - ai-governance-review
    - production-readiness-review
  compliance:
    - GDPR
  audit_log: true
  policy_as_code: true

cloud:
  provider: local-first
  production_target: aws
  iac: kubernetes-helm
  deployment_regions:
    - eu-west-1

observability:
  logging: slf4j-structured
  tracing: opentelemetry
  metrics: micrometer-prometheus
  dashboards: grafana
  slo_tracking: true

delivery:
  team_structure: solo
  methodology: incremental
  cicd_platform: github-actions
  branch_strategy: feature-branches
  commit_convention: conventional-commits

bootstrap:
  source: eeik-bootstrap
  source_repo: suplab/eeik-bootstrap
  bootstrapped_at: "2026-06-14"
  capability_packs_activated:
    - java
    - ai-engineering
    - architecture
    - governance
    - devsecops
