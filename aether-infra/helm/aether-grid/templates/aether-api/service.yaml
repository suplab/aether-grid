apiVersion: v1
kind: Service
metadata:
  name: aether-api
  namespace: {{ include "aether-grid.namespace" . }}
  labels:
    {{- include "aether-grid.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aether-api
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      protocol: TCP
