apiVersion: v1
kind: ConfigMap
metadata:
  name: aether-api-config
  namespace: {{ include "aether-grid.namespace" . }}
  labels:
    {{- include "aether-grid.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
data:
  kafka-bootstrap-servers: {{ .Values.api.config.kafkaBootstrapServers | quote }}
  jwt-issuer: {{ .Values.api.config.jwtIssuer | quote }}
  llm-provider: {{ .Values.api.config.llmProvider | quote }}
  spring-profiles-active: {{ .Values.api.config.springProfilesActive | quote }}
