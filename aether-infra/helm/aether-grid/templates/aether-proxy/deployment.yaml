apiVersion: apps/v1
kind: Deployment
metadata:
  name: aether-proxy
  namespace: {{ include "aether-grid.namespace" . }}
  labels:
    {{- include "aether-grid.labels" . | nindent 4 }}
    app.kubernetes.io/component: data-plane
spec:
  replicas: {{ .Values.proxy.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: aether-proxy
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aether-proxy
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
        app.kubernetes.io/part-of: aether-grid
        app.kubernetes.io/component: data-plane
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
        # Force pod restart when the ConfigMap changes.
        checksum/config: {{ include (print $.Template.BasePath "/aether-proxy/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "aether-grid.proxy.serviceAccountName" . }}
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        {{- if not .Values.openshift.enabled }}
        runAsUser: 1000
        fsGroup: 1000
        {{- end }}

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: aether-proxy
              app.kubernetes.io/instance: {{ .Release.Name }}

      containers:
        - name: aether-proxy
          image: {{ include "aether-grid.proxy.image" . }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          securityContext:
            runAsNonRoot: true
            {{- if not .Values.openshift.enabled }}
            runAsUser: 1000
            {{- end }}
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          resources:
            {{- toYaml .Values.proxy.resources | nindent 12 }}

          env:
            # ── Secrets (External Secrets Operator / pre-created Secret) ──────
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.proxy.secrets.existingSecret }}
                  key: postgres-url
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.proxy.secrets.existingSecret }}
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.proxy.secrets.existingSecret }}
                  key: postgres-password
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.proxy.secrets.existingSecret }}
                  key: redis-url
            # ── ConfigMap ─────────────────────────────────────────────────────
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: aether-proxy-config
                  key: kafka-bootstrap-servers
            - name: RATE_LIMIT_RPS
              valueFrom:
                configMapKeyRef:
                  name: aether-proxy-config
                  key: rate-limit-rps
            - name: RATE_LIMIT_BURST
              valueFrom:
                configMapKeyRef:
                  name: aether-proxy-config
                  key: rate-limit-burst
            - name: OUTBOX_RELAY_INTERVAL_MS
              valueFrom:
                configMapKeyRef:
                  name: aether-proxy-config
                  key: outbox-relay-interval-ms
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: aether-proxy-config
                  key: spring-profiles-active

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
