# DO NOT commit actual secret values. Use External Secrets Operator or kubectl create secret.
# Template only — fill in base64-encoded values before applying.
#
# To encode a value:  echo -n 'value' | base64
# To apply:          kubectl apply -f secrets-template.yaml -n aether-grid
#
# For production, prefer External Secrets Operator backed by AWS Secrets Manager,
# HashiCorp Vault, or GCP Secret Manager instead of applying this file directly.
apiVersion: v1
kind: Secret
metadata:
  name: aether-api-secrets
  namespace: aether-grid
  labels:
    app.kubernetes.io/name: aether-api
    app.kubernetes.io/part-of: aether-grid
type: Opaque
data:
  # echo -n 'jdbc:postgresql://postgres:5432/aethergrid' | base64
  postgres-url: ""
  # echo -n 'aether' | base64
  postgres-user: ""
  # echo -n 'changeme' | base64
  postgres-password: ""
  # echo -n 'gsk_...' | base64
  groq-api-key: ""
  # echo -n 'sk-ant-...' | base64
  anthropic-api-key: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: aether-proxy-secrets
  namespace: aether-grid
  labels:
    app.kubernetes.io/name: aether-proxy
    app.kubernetes.io/part-of: aether-grid
type: Opaque
data:
  # echo -n 'jdbc:postgresql://postgres:5432/aethergrid' | base64
  postgres-url: ""
  # echo -n 'aether' | base64
  postgres-user: ""
  # echo -n 'changeme' | base64
  postgres-password: ""
  # echo -n 'redis://redis:6379' | base64
  redis-url: ""
