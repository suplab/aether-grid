apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aether-proxy
  namespace: aether-grid
  labels:
    app.kubernetes.io/name: aether-proxy
    app.kubernetes.io/part-of: aether-grid
    app.kubernetes.io/component: data-plane
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aether-proxy
  minReplicas: 2
  maxReplicas: 16
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
