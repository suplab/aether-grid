apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aether-api
  namespace: aether-grid
  labels:
    app.kubernetes.io/name: aether-api
    app.kubernetes.io/part-of: aether-grid
    app.kubernetes.io/component: control-plane
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aether-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
