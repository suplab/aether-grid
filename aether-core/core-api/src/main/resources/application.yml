spring:
  application:
    name: aether-core
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/aether_core}
    username: ${POSTGRES_USER:aether}
    password: ${POSTGRES_PASSWORD:aether}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

aether:
  core:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    embedding:
      model: ${EMBEDDING_MODEL:all-minilm}
