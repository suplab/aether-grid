services:
  postgres-core:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aether_core
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aether_core"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-core-data:/var/lib/postgresql/data

  aether-core:
    build:
      context: ../..
      dockerfile: core-api/Dockerfile
    ports:
      - "8082:8082"
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres-core:5432/aether_core
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: aether
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      postgres-core:
        condition: service_healthy

volumes:
  postgres-core-data:
