name: Docker Build & Push

# Docker image build and push to GHCR for aether-api and aether-proxy.
# Triggered on push to main or any release/** branch.
# CI (compile + test) is handled separately in ci.yml and must pass before
# merging to main; this workflow publishes the resulting images.

on:
  push:
    branches:
      - main
      - "release/**"
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & push ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write   # OIDC token for keyless signing / future Cosign use
      packages: write   # push to GHCR

    strategy:
      fail-fast: false
      matrix:
        app:
          - aether-api
          - aether-proxy

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up QEMU (multi-platform emulation)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff9f4f75e2652f1b07f  # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a986e2fcba28e89b5c1cfc9  # v5.7.0
        with:
          images: ghcr.io/suplab/${{ matrix.app }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          file: ${{ matrix.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
